<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>VIBE Games</title>

<style>

body{
background:#141414;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:black;
}

.logo{
color:#e50914;
font-size:26px;
font-weight:bold;
}

.nav-left{
display:flex;
gap:25px;
align-items:center;
}

.nav-left a{
color:white;
text-decoration:none;
font-size:15px;
}

.nav-left a:hover{
color:#e50914;
}

/* PAGE TITLE */

.page-title{
padding-left:40px;
margin-top:25px;
}

/* GAME GRID */

.games-grid{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

/* GAME CARD */

.game-card{
background:#1c1c1c;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.game-card:hover{
transform:scale(1.05);
}

/* GAME IMAGE */

.game-card img{
width:100%;
height:250px;
object-fit:cover;
background:#222;
}

/* GAME INFO */

.game-info{
padding:12px;
}

.game-info h3{
margin:5px 0;
font-size:16px;
}

/* PLAY BUTTON */

.play-btn{
display:inline-block;
margin-top:8px;
background:#e50914;
color:white;
padding:6px 14px;
text-decoration:none;
border-radius:6px;
font-size:14px;
}

.play-btn:hover{
background:#ff1f1f;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="nav-left">

<div class="logo">VIBE</div>

<a href="/home">Home</a>
<a href="/shows">Shows</a>
<a href="/movies">Movies</a>
<a href="/music">Music</a>
<a href="/games">Games</a>

</div>

</div>


<h2 class="page-title">🎮 Games</h2>


<!-- GAMES GRID -->

<div class="games-grid">

{% for game in games %}

<div class="game-card">

<img 
src="{{ game.image }}" 
alt="{{ game.title }}"
onerror="this.src='https://picsum.photos/400/300?random={{ loop.index }}'">

<div class="game-info">

<h3>{{ game.title }}</h3>

<a href="/play?url={{ game.url }}" class="play-btn">
▶ Play
</a>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
