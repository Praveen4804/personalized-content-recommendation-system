<!DOCTYPE html>
<html lang="en">
<head>
  <title>VIBE</title>
  <link rel="stylesheet" href="/static/home.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">

  <div class="nav-left">
    <div class="logo">VIBE</div>

    <div class="nav-menu">
      <a class="nav-link active" href="{{ url_for('home') }}">Home</a>
      <a class="nav-link" href="{{ url_for('shows') }}">Shows</a>
      <a class="nav-link" href="{{ url_for('movies') }}">Movies</a>
      <a class="nav-link" href="{{ url_for('music') }}">Music</a>
      <a class="nav-link" href="{{ url_for('games') }}">Games</a>
    </div>
  </div>

  <!-- FILTER + SEARCH -->
  <div class="nav-search">

    <!-- Filter Section -->
    <form method="GET" action="/home" class="filter-nav">

      <select name="genre">
        <option value="">Select Genre</option>
        {% for g in genres %}
        <option value="{{ g }}"
        {% if selected_genre == g %}selected{% endif %}>
        {{ g }}
        </option>
        {% endfor %}
      </select>

      <select name="language">
        <option value="">Select Language</option>
        {% for l in languages %}
        <option value="{{ l }}"
        {% if selected_language == l %}selected{% endif %}>
        {{ l }}
        </option>
        {% endfor %}
      </select>

      <button type="submit">Filter</button>

    </form>

    <!-- Reset Filter -->
    {% if selected_genre or selected_language %}
    <p class="reset-filter" onclick="window.location.href='/home'">
      Reset Filter
    </p>
    {% endif %}

    <!-- Search Section -->
    <div class="search-container" id="searchContainer">

      <input
        type="text"
        id="searchInput"
        placeholder="Search movies, shows..."
        autocomplete="off"
      />

      <button id="voiceBtn">🎤</button>

      <button id="searchBtn">Search</button>

      <div id="searchResults"></div>

    </div>

  </div>

</nav>
<!-- ========================================== -->


<!-- ================= HERO ================= -->
<section class="hero-banner" id="heroBanner">

  <div class="overlay"></div>

  <div class="hero-content">

    <h1 id="heroTitle"></h1>

    <p id="heroDesc"></p>

    <a id="heroPlay" class="play-btn">▶ Play</a>

  </div>

</section>

<script type="application/json" id="hero-data">
{{ hero_movies | tojson | safe }}
</script>


<!-- ================= MOVIE ROWS ================= -->

<h2>Recommended for You</h2>

<div class="row">
{% for m in recommended_movies %}
<a href="/movie/{{ m.movie_id }}">
<img src="{{ m.poster_url }}">
</a>
{% endfor %}
</div>


<h2>Popular</h2>

<div class="row">
{% for m in popular_movies %}
<a href="/movie/{{ m.movie_id }}">
<img src="{{ m.poster_url }}">
</a>
{% endfor %}
</div>


<h2>All Movies</h2>

<div class="all-movies-grid">
{% for movie in all_movies %}
<a href="/movie/{{ movie.movie_id }}" class="movie-card">
<img src="{{ movie.poster_url }}">
</a>
{% endfor %}
</div>


<!-- ================= TOAST ================= -->
<div id="toast" class="toast"></div>


<!-- ================= VOICE UI ================= -->
<div id="voiceListening" class="voice-listening">

  <div class="pulse-ring"></div>

  <div class="pulse-ring delay"></div>

  <div class="mic-core">🎤</div>

</div>


<!-- ================= HERO SCRIPT ================= -->
<script>

const HERO_MOVIES = JSON.parse(
document.getElementById("hero-data").textContent
);

let heroIndex = 0;

const banner = document.getElementById("heroBanner");
const heroTitle = document.getElementById("heroTitle");
const heroDesc = document.getElementById("heroDesc");
const heroPlay = document.getElementById("heroPlay");

function updateHero(){

  const m = HERO_MOVIES[heroIndex];

  banner.style.backgroundImage =
  `linear-gradient(to right, rgba(0,0,0,.85), rgba(0,0,0,.25)), url('${m.banner_url}')`;

  heroTitle.textContent = m.title;

  heroDesc.textContent = m.description;

  heroPlay.href = `/movie/${m.movie_id}`;

  heroIndex = (heroIndex + 1) % HERO_MOVIES.length;

}

updateHero();

setInterval(updateHero, 6000);

</script>

</body>
</html>
